<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div>
        <form class="form">
            <h3>Registro</h3>
            <div class="form-input">
                <div class="inputs">
                    <label for="surname-input">Apellido:</label>
                    <input type="text" name="name" id="surname-input" placeholder="Ingrese su Apellido">
                </div>
                <div class="inputs">
                    <label for="name-input">Nombre:</label>
                    <input type="text" name="name" id="name-input" placeholder="Ingrese su Nombre">
                </div>
                <div class="inputs">
                    <label for="dni-input">DNI:</label>
                    <input type="number" name="name" id="dni-input" placeholder="Ingrese su DNI">
                </div>
                <div class="inputs">
                    <label for="email-input">Email:</label>
                    <input type="email" name="name" id="email-input" placeholder="Ingrese su Apellido">
                </div>

                <button type="submit" id="button">Registrar</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
